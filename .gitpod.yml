# For details see https://www.gitpod.io/docs/config-gitpod-file

tasks:

  - before: |
    sudo apt update && sudo apt upgrade
    sudo apt install build-essential libgmp-dev libdb-dev libjson-c-dev ncurses-dev libxml2-dev
    sudo apt install automake libtool flex bison help2man texinfo # lcov
    # sudo apt install gettext texlive-base  # for make dist (po/*, doc/gnucobol.pdf)

  - init: |
    mkdir -p build && cd build
    test -f ../configure || ../autogen.sh
    test -f config.h     || ../configure --enable-cobc-internal-checks --enable-debug --enable-code-coverage
    nice make --jobs=$(nproc)
    make -C tests testsuite
    make -C tests/cobol85 --jobs=$(nproc) modules

  - command: |
    printf '\n\n(re-)running build...\n\n'
    nice make --jobs=$(nproc)

    # printf '\n\nverify working distribution and running testsuite...\n\n'
    # nice make --jobs=$(nproc) distcheck TESTSUITEFLAGS="--jobs=$(nproc)"

    # printf '\n\nrunning NIST85...\n\n'
    # nice make -C tests/cobol85 --jobs=$(nproc) test

    # printf '\n\nverify working distribution and running testsuite...\n\n'
    # nice make --jobs=$(nproc) distcheck TESTSUITEFLAGS="--jobs=$(nproc)"

    # printf '\n\nrunning NIST85...\n\n'
    # nice make -C tests/cobol85 --jobs=$(nproc) test

    printf '\n\nbuild commands finished\n\n'
    echo 'You may want to run the following commands after doing your changes'
    echo '* rebuilding via:'
    echo '  make --jobs=$(nproc)'
    echo '* to run both the internal testsuite and NIST85:'
    echo '  nice make checkall --jobs=2 TESTSUITEFLAGS="--jobs=4"'
    echo '* to calculate test coverage:'
    echo '  sudo yum install lcov'
    echo '  nice make check-code-coverage TESTSUITEFLAGS="--jobs=$(nproc)"'
